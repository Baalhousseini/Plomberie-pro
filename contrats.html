<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GreenFlow — Contrats Maintenance</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
:root{--blue:#0d2d52;--blue2:#1a4a7a;--green:#3a8c30;--green2:#5ab048;--purple:#7c3aed;--bg:#f4f6f9;--card:#fff;--border:#dde3ec;--text:#0d1b2e;--muted:#6b7a8f;--shadow:0 1px 4px rgba(13,45,82,.08),0 4px 16px rgba(13,45,82,.06);}
body{background:var(--bg);color:var(--text);min-height:100vh;}
.hidden{display:none!important;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--blue);}
.login-box{background:#fff;border-radius:20px;padding:40px 32px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.28);}
.login-title{color:var(--blue);font-size:17px;font-weight:700;text-align:center;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;color:var(--muted);font-size:10px;letter-spacing:1.2px;font-weight:700;margin-bottom:7px;text-transform:uppercase;}
.field input{width:100%;background:#f7f9fc;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;}
.pin-row{display:flex;gap:10px;justify-content:center;margin:10px 0;}
.pin-input{width:56px!important;height:56px;text-align:center;font-size:22px;font-weight:800;background:#f7f9fc;border:1.5px solid var(--border);border-radius:10px;color:var(--blue);outline:none;}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}
.error-msg{color:#dc2626;font-size:12px;text-align:center;margin-top:10px;font-weight:600;}
.header{background:var(--blue);padding:0 16px;height:56px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.header-title{color:#fff;font-size:15px;font-weight:800;}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;}
.module-nav{background:#0a2240;display:flex;gap:4px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.06);}
.module-nav::-webkit-scrollbar{display:none;}
.mnav-btn{flex-shrink:0;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:7px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.mnav-btn.active,.mnav-btn:hover{background:#3a8c30;border-color:#3a8c30;color:#fff;}
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 14px;background:var(--purple);}
.kpi-box{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 6px;text-align:center;}
.kpi-val{font-size:19px;font-weight:800;color:#fff;line-height:1;}
.kpi-lbl{color:rgba(255,255,255,.55);font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-top:3px;}
.kpi-grn{color:#a7f3d0!important;}
.kpi-yel{color:#fde68a!important;}
.tabs{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;}
.tab-btn{flex:1;min-width:80px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;padding:13px 8px;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:all .18s;font-family:'Inter',sans-serif;}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);}
.content{max-width:700px;margin:0 auto;padding:12px 14px;}
.sc-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);}
.sc-val{font-weight:800;font-size:20px;margin-top:4px;letter-spacing:-.3px;}
.lbl{color:var(--muted);font-size:9px;letter-spacing:1.8px;margin-bottom:8px;font-weight:700;text-transform:uppercase;}
.contrat-card{background:#fff;border:1px solid var(--border);border-left:4px solid var(--purple);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);}
.contrat-card.expire{border-left-color:#dc2626;}
.contrat-card.suspendu{border-left-color:#94a3b8;opacity:.7;}
.contrat-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.contrat-ref{font-size:9px;color:var(--muted);font-weight:700;background:#f1f5f9;border-radius:4px;padding:2px 6px;}
.contrat-client{font-weight:700;font-size:14px;margin:4px 0 2px;}
.contrat-type{color:var(--muted);font-size:12px;}
.contrat-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-red{background:#fee2e2;color:#dc2626;}
.badge-gray{background:#f1f5f9;color:#475569;}
.badge-orange{background:#fff7ed;color:#c2410c;}
.badge-purple{background:#f3e8ff;color:#7c3aed;}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-purple{background:#f3e8ff;color:#7c3aed;}
.btn-green{background:var(--green);color:#fff;}
.btn-blue{background:#eff6ff;color:#1d4ed8;}
.btn-gray{background:#f1f5f9;color:#475569;}
.btn-red{background:#fee2e2;color:#dc2626;}
.btn-full{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-primary{background:var(--purple);color:#fff;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;overflow-y:auto;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:22px 16px 40px;margin-top:60px;max-width:700px;margin-left:auto;margin-right:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:800;}
.modal-close{background:#f1f5f9;border:none;color:var(--muted);border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;font-weight:700;}
.form-field{margin-bottom:14px;}
.form-field label{display:block;color:var(--muted);font-size:10px;letter-spacing:1.2px;font-weight:700;margin-bottom:6px;text-transform:uppercase;}
.form-input,.form-select{width:100%;background:#f7f9fc;border:2px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;box-sizing:border-box;font-family:'Inter',sans-serif;transition:border-color .2s;}
.form-input:focus,.form-select:focus{border-color:var(--purple);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.alerte-bar{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:12px 16px;margin-bottom:12px;}
.alerte-bar-title{color:#92400e;font-size:12px;font-weight:800;margin-bottom:8px;}
.alerte-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fed7aa;}
.alerte-item:last-child{border-bottom:none;}
.week-block{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.week-title{font-size:12px;font-weight:800;color:var(--blue);margin-bottom:10px;}
.plan-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.plan-item:last-child{border-bottom:none;}
.rev-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.rev-row:last-child{border-bottom:none;}
.rev-type{font-weight:600;font-size:13px;}
.rev-val{font-weight:800;color:var(--purple);font-size:13px;}
.progress-bar{background:#e2e8f0;border-radius:6px;height:8px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:var(--purple);transition:width .5s;}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;border-radius:10px;padding:11px 20px;font-weight:700;font-size:13px;z-index:999;}
.empty{text-align:center;padding:40px 0;color:var(--muted);}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-title">GreenFlow · Contrats Maintenance</div>
    <div class="field"><label>Identifiant</label><input type="text" id="identifiant" placeholder="patron / dispatch"></div>
    <div class="field"><label>Code PIN</label>
      <div class="pin-row">
        <input class="pin-input" id="p1" maxlength="1" inputmode="numeric">
        <input class="pin-input" id="p2" maxlength="1" inputmode="numeric">
        <input class="pin-input" id="p3" maxlength="1" inputmode="numeric">
        <input class="pin-input" id="p4" maxlength="1" inputmode="numeric">
      </div>
    </div>
    <button class="btn-login" onclick="seConnecter()">Connexion →</button>
    <div class="error-msg hidden" id="loginError">Identifiant ou PIN incorrect</div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <div class="header-title">📋 Contrats Maintenance</div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
  <div class="module-nav hidden" id="module-nav"></div>

  <div class="kpi-strip">
    <div class="kpi-box"><div class="kpi-val kpi-grn" id="kpi-actifs">0</div><div class="kpi-lbl">Actifs</div></div>
    <div class="kpi-box"><div class="kpi-val" id="kpi-mrr">0€</div><div class="kpi-lbl">MRR</div></div>
    <div class="kpi-box"><div class="kpi-val" id="kpi-arr">0€</div><div class="kpi-lbl">ARR</div></div>
    <div class="kpi-box"><div class="kpi-val kpi-yel" id="kpi-renouv">0</div><div class="kpi-lbl">À renouveler</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-dash" onclick="showTab('dash')">📊 Dashboard</button>
    <button class="tab-btn" id="tab-contrats" onclick="showTab('contrats')">📋 Contrats</button>
    <button class="tab-btn" id="tab-planning" onclick="showTab('planning')">📅 Planning</button>
    <button class="tab-btn" id="tab-revenus" onclick="showTab('revenus')">💶 Revenus</button>
  </div>

  <div id="page-dash" class="content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;" id="dash-grid"></div>
    <div id="alerte-renouvellement"></div>
    <div style="background:#f3e8ff;border:1px solid #ddd6fe;border-radius:12px;padding:14px 16px;margin-bottom:12px;">
      <div style="color:#6d28d9;font-size:11px;font-weight:800;margin-bottom:8px;">📈 OBJECTIF 12M€ — CONTRATS RÉCURRENTS</div>
      <div id="prog-contrats"></div>
    </div>
    <div id="prochains-entretiens"></div>
  </div>

  <div id="page-contrats" class="content hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:700;" id="contrats-count">0 contrats</div>
      <button class="btn-sm btn-primary" onclick="ouvrirNouveauContrat()">+ Nouveau contrat</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;">
      <button class="btn-sm btn-gray" onclick="filtrerContrats('')">Tous</button>
      <button class="btn-sm btn-purple" onclick="filtrerContrats('Actif')">Actifs</button>
      <button class="btn-sm btn-red" onclick="filtrerContrats('Expiré')">Expirés</button>
      <button class="btn-sm btn-gray" onclick="filtrerContrats('En attente')">En attente</button>
    </div>
    <div id="liste-contrats"></div>
  </div>

  <div id="page-planning" class="content hidden">
    <div id="planning-content"></div>
  </div>

  <div id="page-revenus" class="content hidden">
    <div id="revenus-content"></div>
  </div>
</div>

<!-- MODAL NOUVEAU CONTRAT -->
<div class="modal-bg hidden" id="modal-contrat">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modal-contrat-title">Nouveau contrat</div>
      <button class="modal-close" onclick="closeModal('modal-contrat')">×</button>
    </div>
    <div class="form-field"><label>Client — Nom *</label><input type="text" class="form-input" id="c-nom" placeholder="Nom du client"></div>
    <div class="grid-2">
      <div class="form-field"><label>Téléphone *</label><input type="tel" class="form-input" id="c-tel"></div>
      <div class="form-field"><label>Email</label><input type="email" class="form-input" id="c-email"></div>
    </div>
    <div class="form-field"><label>Adresse *</label><input type="text" class="form-input" id="c-adresse" placeholder="Adresse complète"></div>
    <div class="grid-2">
      <div class="form-field"><label>Type de contrat *</label>
        <select class="form-select" id="c-type">
          <option value="">-- Sélectionner --</option>
          <option>Entretien chaudière gaz</option>
          <option>Entretien PAC</option>
          <option>Entretien climatisation</option>
          <option>Entretien chaudière fioul</option>
          <option>Entretien ballon ECS</option>
          <option>Multi-équipements</option>
          <option>Contrat Pro</option>
        </select>
      </div>
      <div class="form-field"><label>Équipement</label><input type="text" class="form-input" id="c-equipement" placeholder="Ex: Viessmann Vitodens 200"></div>
    </div>
    <div class="grid-2">
      <div class="form-field"><label>Marque</label><input type="text" class="form-input" id="c-marque" placeholder="Viessmann, Atlantic..."></div>
      <div class="form-field"><label>Technicien attribué</label>
        <select class="form-select" id="c-tech">
          <option value="">Non attribué</option>
          <option>Technicien 1</option>
          <option>Technicien 2</option>
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-field"><label>Date de début *</label><input type="date" class="form-input" id="c-debut"></div>
      <div class="form-field"><label>Périodicité</label>
        <select class="form-select" id="c-periodicite">
          <option value="annuel">Annuel</option>
          <option value="mensuel">Mensuel</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Tarif (€)</label><input type="number" class="form-input" id="c-tarif" placeholder="0"></div>
    <div class="form-field"><label>Notes</label><input type="text" class="form-input" id="c-notes" placeholder="Observations, conditions particulières..."></div>
    <button class="btn-full btn-primary" onclick="sauvegarderContrat()">Enregistrer le contrat ✓</button>
  </div>
</div>

<script>
const USERS={patron:{nom:'Patron',role:'PATRON',pin:'2580'},dispatch:{nom:'Secretariat',role:'DISPATCH',pin:'1470'},tech1:{nom:'Technicien 1',role:'TECHNICIEN',pin:'3691'},tech2:{nom:'Technicien 2',role:'TECHNICIEN',pin:'8024'}};
const MODULES=[
  {file:'index.html',label:'Technicien',icon:'👷',roles:['TECHNICIEN','PATRON','DISPATCH']},
  {file:'dispatch.html',label:'Dispatch',icon:'📋',roles:['DISPATCH','PATRON']},
  {file:'patron.html',label:'Patron',icon:'👔',roles:['PATRON']},
  {file:'patron-analytics.html',label:'Analytics',icon:'📊',roles:['PATRON']},
  {file:'secretaire.html',label:'Secrétariat',icon:'🗂️',roles:['PATRON','DISPATCH']},
  {file:'crm.html',label:'CRM',icon:'👥',roles:['PATRON','DISPATCH']},
  {file:'contrats.html',label:'Contrats',icon:'📋',roles:['PATRON','DISPATCH']},
];

let currentUser=null,filterStatut='',editId=null;

const getContrats=()=>{try{return JSON.parse(localStorage.getItem('pl_contrats')||'[]');}catch{return[];}};
const saveContrats=c=>localStorage.setItem('pl_contrats',JSON.stringify(c));
const getRdvs=()=>{try{return JSON.parse(localStorage.getItem('pl_rdvs')||'[]');}catch{return[];}};
const todayStr=()=>new Date().toISOString().split('T')[0];

document.querySelectorAll('.pin-input').forEach((el,i,arr)=>{
  el.addEventListener('input',()=>{if(el.value&&i<arr.length-1)arr[i+1].focus();});
  el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&i>0)arr[i-1].focus();});
});

function seConnecter(){
  const id=document.getElementById('identifiant').value.trim().toLowerCase();
  const pin=['p1','p2','p3','p4'].map(i=>document.getElementById(i).value).join('');
  const user=USERS[id];
  if(!user||user.pin!==pin){document.getElementById('loginError').classList.remove('hidden');return;}
  if(user.role==='TECHNICIEN'){alert('Accès non autorisé');return;}
  currentUser={...user,id};
  localStorage.setItem('pl_session_contrats',JSON.stringify(currentUser));
  lancerApp();
}

function lancerApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('c-debut').value=todayStr();
  renderModuleNav();
  renderAll();
}

function logout(){localStorage.removeItem('pl_session_contrats');currentUser=null;document.getElementById('login').classList.remove('hidden');document.getElementById('app').classList.add('hidden');}

function renderModuleNav(){
  const nav=document.getElementById('module-nav');if(!nav)return;
  const role=currentUser.role;
  const v=MODULES.filter(m=>m.roles.includes(role));
  if(v.length<=1)return;
  nav.classList.remove('hidden');
  const base=location.href.substring(0,location.href.lastIndexOf('/')+1);
  nav.innerHTML=v.map(m=>`<button class="mnav-btn${m.file==='contrats.html'?' active':''}" onclick="location.href='${base}${m.file}'">${m.icon} ${m.label}</button>`).join('');
}

function showTab(t){
  ['dash','contrats','planning','revenus'].forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('hidden',x!==t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='contrats')renderContrats();
  else if(t==='planning')renderPlanning();
  else if(t==='revenus')renderRevenus();
}

function renderAll(){
  const contrats=getContrats();
  const now=todayStr();
  const d60=new Date();d60.setDate(d60.getDate()+60);
  const d60str=d60.toISOString().split('T')[0];
  const actifs=contrats.filter(c=>c.statut==='Actif');
  const mrr=actifs.reduce((s,c)=>s+(c.periodicite==='mensuel'?c.tarif:(c.tarif||0)/12),0);
  const arr=mrr*12;
  const renouv=actifs.filter(c=>c.dateFin<=d60str).length;
  document.getElementById('kpi-actifs').textContent=actifs.length;
  document.getElementById('kpi-mrr').textContent=Math.round(mrr)+'€';
  document.getElementById('kpi-arr').textContent=Math.round(arr)+'€';
  document.getElementById('kpi-renouv').textContent=renouv;
  renderDash(contrats,actifs,mrr,arr,renouv,d60str);
}

function renderDash(contrats,actifs,mrr,arr,renouv,d60str){
  const d14=new Date();d14.setDate(d14.getDate()+14);
  const d14str=d14.toISOString().split('T')[0];
  document.getElementById('dash-grid').innerHTML=[
    ['Contrats actifs',actifs.length,'#7c3aed'],
    ['MRR',Math.round(mrr)+'€','#3a8c30'],
    ['ARR',Math.round(arr)+'€','#1a4a7a'],
    ['Prochain entretien (14j)',actifs.filter(c=>c.prochainEntretien&&c.prochainEntretien<=d14str).length,'#f59e0b'],
  ].map(([l,v,c])=>`<div class="sc-card" style="border-left:3px solid ${c}"><div class="lbl">${l.toUpperCase()}</div><div class="sc-val" style="color:${c}">${v}</div></div>`).join('');
  const enAlerte=actifs.filter(c=>c.dateFin&&c.dateFin<=d60str).sort((a,b)=>a.dateFin.localeCompare(b.dateFin));
  document.getElementById('alerte-renouvellement').innerHTML=enAlerte.length?`<div class="alerte-bar">
    <div class="alerte-bar-title">⚠️ ${enAlerte.length} contrat(s) à renouveler dans 60 jours</div>
    ${enAlerte.slice(0,5).map(c=>`<div class="alerte-item"><span style="font-size:12px;font-weight:600;">${c.clientNom} — ${c.type}</span><span style="font-size:11px;color:#c2410c;font-weight:700;">Expire le ${c.dateFin}</span></div>`).join('')}
  </div>`:'';
  const cible=200;const pct=Math.min(100,Math.round(actifs.length/cible*100));
  document.getElementById('prog-contrats').innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;"><span style="font-weight:600;">${actifs.length} contrats actifs</span><span style="color:#7c3aed;font-weight:700;">Cible : ${cible} (≈${Math.round(cible*mrr/Math.max(actifs.length,1))}€/mois)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div style="font-size:11px;color:#6d28d9;margin-top:4px;">${pct}% de l'objectif — ${cible-actifs.length} contrats restants</div>`;
  const prochains=actifs.filter(c=>c.prochainEntretien&&c.prochainEntretien>=todayStr()&&c.prochainEntretien<=d14str).sort((a,b)=>a.prochainEntretien.localeCompare(b.prochainEntretien));
  document.getElementById('prochains-entretiens').innerHTML=prochains.length?`<div class="sc-card"><div class="lbl">Prochains entretiens (14j)</div>${prochains.map(c=>`<div class="rev-row"><div><div style="font-weight:700;font-size:13px;">${c.clientNom}</div><div style="font-size:11px;color:var(--muted);">${c.type} · ${c.technicienAttribue||'Non attribué'}</div></div><div style="text-align:right;"><div style="font-weight:700;font-size:12px;color:#7c3aed;">${c.prochainEntretien}</div><button class="btn-sm btn-green" style="margin-top:4px;" onclick="planifierEntretien('${c.id}')">Planifier</button></div></div>`).join('')}</div>`:'';
}

function filtrerContrats(s){filterStatut=s;renderContrats();}

function renderContrats(){
  let c=getContrats();
  if(filterStatut)c=c.filter(x=>x.statut===filterStatut);
  document.getElementById('contrats-count').textContent=c.length+' contrat'+(c.length>1?'s':'');
  document.getElementById('liste-contrats').innerHTML=c.length?c.map(renderContratCard).join(''):`<div class="empty">📋 Aucun contrat<br><br><button class="btn-sm btn-primary" onclick="ouvrirNouveauContrat()">+ Créer le premier contrat</button></div>`;
}

function renderContratCard(c){
  const sBdg=c.statut==='Actif'?'badge-green':c.statut==='Expiré'?'badge-red':c.statut==='Suspendu'?'badge-gray':'badge-orange';
  return`<div class="contrat-card ${c.statut==='Expiré'?'expire':c.statut==='Suspendu'?'suspendu':''}">
    <div class="contrat-header">
      <div>
        <div><span class="contrat-ref">${c.ref}</span> <span class="badge badge-purple">${c.periodicite}</span></div>
        <div class="contrat-client">${c.clientNom}</div>
        <div class="contrat-type">${c.type}${c.equipement?' · '+c.equipement:''}</div>
      </div>
      <div style="text-align:right;">
        <span class="badge ${sBdg}">${c.statut}</span>
        <div style="font-size:16px;font-weight:800;color:#7c3aed;margin-top:6px;">${c.tarif}€<span style="font-size:10px;font-weight:600;color:var(--muted);">/${c.periodicite==='mensuel'?'mois':'an'}</span></div>
      </div>
    </div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--muted);">
      <span>📅 Prochain : <strong>${c.prochainEntretien||'—'}</strong></span>
      <span>⏰ Expire : <strong>${c.dateFin||'—'}</strong></span>
      ${c.technicienAttribue?`<span>👷 ${c.technicienAttribue}</span>`:''}
    </div>
    <div class="contrat-actions">
      <button class="btn-sm btn-purple" onclick="planifierEntretien('${c.id}')">📅 Planifier</button>
      <button class="btn-sm btn-green" onclick="renouvelerContrat('${c.id}')">🔄 Renouveler</button>
      <button class="btn-sm btn-blue" onclick="editerContrat('${c.id}')">✏️ Modifier</button>
      <button class="btn-sm btn-red" onclick="resilierContrat('${c.id}')">⏹ Résilier</button>
    </div>
  </div>`;
}

function renderPlanning(){
  const contrats=getContrats().filter(c=>c.statut==='Actif'&&c.prochainEntretien);
  const d90=new Date();d90.setDate(d90.getDate()+90);
  const d90str=d90.toISOString().split('T')[0];
  const prochains=contrats.filter(c=>c.prochainEntretien>=todayStr()&&c.prochainEntretien<=d90str).sort((a,b)=>a.prochainEntretien.localeCompare(b.prochainEntretien));
  const byWeek={};
  prochains.forEach(c=>{
    const d=new Date(c.prochainEntretien+'T12:00');
    const startOfWeek=new Date(d);startOfWeek.setDate(d.getDate()-d.getDay()+1);
    const key=startOfWeek.toISOString().split('T')[0];
    if(!byWeek[key])byWeek[key]=[];
    byWeek[key].push(c);
  });
  document.getElementById('planning-content').innerHTML=Object.keys(byWeek).sort().map(w=>{
    const wDate=new Date(w+'T12:00');
    const wLabel='Semaine du '+wDate.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
    return`<div class="week-block"><div class="week-title">${wLabel} (${byWeek[w].length})</div>${byWeek[w].map(c=>`<div class="plan-item"><div><div style="font-weight:700;font-size:13px;">${c.clientNom}</div><div style="font-size:11px;color:var(--muted);">${c.type} · ${c.adresse.split(',')[0]}</div></div><div style="text-align:right;"><div style="font-size:11px;font-weight:700;color:#7c3aed;">${c.prochainEntretien}</div><button class="btn-sm btn-purple" style="margin-top:4px;" onclick="planifierEntretien('${c.id}')">Planifier</button></div></div>`).join('')}</div>`;
  }).join('')||'<div class="empty">Aucun entretien planifié dans les 90 jours</div>';
}

function renderRevenus(){
  const contrats=getContrats().filter(c=>c.statut==='Actif');
  const byType={};
  contrats.forEach(c=>{
    if(!byType[c.type])byType[c.type]={count:0,mrr:0};
    byType[c.type].count++;
    byType[c.type].mrr+=c.periodicite==='mensuel'?c.tarif:(c.tarif||0)/12;
  });
  const total=contrats.reduce((s,c)=>s+(c.periodicite==='mensuel'?c.tarif:(c.tarif||0)/12),0);
  document.getElementById('revenus-content').innerHTML=`
    <div class="sc-card" style="margin-bottom:12px;">
      <div class="lbl">Répartition par type</div>
      ${Object.entries(byType).map(([t,v])=>`<div class="rev-row"><div><div class="rev-type">${t}</div><div style="font-size:11px;color:var(--muted);">${v.count} contrat${v.count>1?'s':''}</div></div><div style="text-align:right;"><div class="rev-val">${Math.round(v.mrr)}€/mois</div><div style="font-size:11px;color:var(--muted);">${Math.round(v.mrr*12)}€/an</div></div></div>`).join('')}
      <div class="rev-row" style="border-top:2px solid var(--border);margin-top:8px;padding-top:12px;"><strong>TOTAL</strong><div style="text-align:right;"><div style="font-size:18px;font-weight:800;color:#7c3aed;">${Math.round(total)}€/mois</div><div style="font-size:12px;color:var(--muted);">${Math.round(total*12)}€/an récurrent</div></div></div>
    </div>
    <div style="background:#f3e8ff;border:1px solid #ddd6fe;border-radius:12px;padding:16px;">
      <div style="color:#6d28d9;font-size:11px;font-weight:800;margin-bottom:10px;">📈 PROJECTIONS BENCHMARKS</div>
      ${[50,100,200,500].map(n=>`<div class="rev-row" style="border-color:#ddd6fe;"><span style="font-size:12px;color:#6d28d9;font-weight:600;">${n} contrats</span><span style="font-size:12px;font-weight:800;color:#7c3aed;">${n===0?0:Math.round((total/Math.max(contrats.length,1))*n)}€/mois · ${Math.round((total/Math.max(contrats.length,1))*n*12)}€/an</span></div>`).join('')}
    </div>`;
}

function ouvrirNouveauContrat(){
  editId=null;
  document.getElementById('modal-contrat-title').textContent='Nouveau contrat';
  ['c-nom','c-tel','c-email','c-adresse','c-equipement','c-marque','c-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c-type').value='';
  document.getElementById('c-tech').value='';
  document.getElementById('c-periodicite').value='annuel';
  document.getElementById('c-tarif').value='';
  document.getElementById('c-debut').value=todayStr();
  document.getElementById('modal-contrat').classList.remove('hidden');
}

function editerContrat(id){
  const c=getContrats().find(x=>x.id==id);if(!c)return;
  editId=id;
  document.getElementById('modal-contrat-title').textContent='Modifier le contrat';
  document.getElementById('c-nom').value=c.clientNom||'';
  document.getElementById('c-tel').value=c.clientTel||'';
  document.getElementById('c-email').value=c.clientEmail||'';
  document.getElementById('c-adresse').value=c.adresse||'';
  document.getElementById('c-type').value=c.type||'';
  document.getElementById('c-equipement').value=c.equipement||'';
  document.getElementById('c-marque').value=c.marque||'';
  document.getElementById('c-tech').value=c.technicienAttribue||'';
  document.getElementById('c-debut').value=c.dateDebut||todayStr();
  document.getElementById('c-periodicite').value=c.periodicite||'annuel';
  document.getElementById('c-tarif').value=c.tarif||'';
  document.getElementById('c-notes').value=c.notes||'';
  document.getElementById('modal-contrat').classList.remove('hidden');
}

function sauvegarderContrat(){
  const nom=document.getElementById('c-nom').value.trim();
  const tel=document.getElementById('c-tel').value.trim();
  const adr=document.getElementById('c-adresse').value.trim();
  const type=document.getElementById('c-type').value;
  if(!nom||!tel||!adr||!type){showNotif('Remplir tous les champs obligatoires');return;}
  const debut=document.getElementById('c-debut').value;
  const per=document.getElementById('c-periodicite').value;
  const fin=new Date(debut);fin.setFullYear(fin.getFullYear()+1);
  const finStr=fin.toISOString().split('T')[0];
  const prochain=per==='mensuel'?new Date(debut):new Date(debut);
  if(per==='mensuel')prochain.setMonth(prochain.getMonth()+1);
  else prochain.setFullYear(prochain.getFullYear()+1);
  const prochainStr=prochain.toISOString().split('T')[0];
  let contrats=getContrats();
  if(editId){
    const idx=contrats.findIndex(c=>c.id==editId);
    if(idx>=0){contrats[idx]={...contrats[idx],clientNom:nom,clientTel:tel,clientEmail:document.getElementById('c-email').value,adresse:adr,type,equipement:document.getElementById('c-equipement').value,marque:document.getElementById('c-marque').value,technicienAttribue:document.getElementById('c-tech').value,dateDebut:debut,dateFin:finStr,periodicite:per,prochainEntretien:prochainStr,tarif:Number(document.getElementById('c-tarif').value)||0,notes:document.getElementById('c-notes').value};}
  } else {
    const n=contrats.length+1;
    contrats.push({id:Date.now(),ref:'CTR-'+new Date().getFullYear()+'-'+String(n).padStart(3,'0'),clientNom:nom,clientTel:tel,clientEmail:document.getElementById('c-email').value||'',adresse:adr,type,equipement:document.getElementById('c-equipement').value||'',marque:document.getElementById('c-marque').value||'',technicienAttribue:document.getElementById('c-tech').value||'',dateDebut:debut,dateFin:finStr,prochainEntretien:prochainStr,periodicite:per,tarif:Number(document.getElementById('c-tarif').value)||0,statut:'Actif',notes:document.getElementById('c-notes').value||'',creeLe:new Date().toISOString(),rappelEnvoye:false});
  }
  saveContrats(contrats);
  closeModal('modal-contrat');
  renderAll();
  renderContrats();
  showNotif(editId?'Contrat modifié ✓':'Contrat créé ✓');
}

function planifierEntretien(id){
  const c=getContrats().find(x=>x.id==id);if(!c)return;
  const rdvs=getRdvs();
  rdvs.push({id:Date.now(),clientNom:c.clientNom,clientTel:c.clientTel,adresse:c.adresse,type:'Entretien maintenance',dateRdv:c.prochainEntretien||todayStr(),heureRdv:'09:00',technicien:c.technicienAttribue||'À planifier',statut:'Confirme',notes:'Contrat '+c.ref+' — '+c.type+(c.equipement?' ('+c.equipement+')':''),prixVente:c.tarif,canal:'Contrat maintenance',creePar:'contrats',datePriseContact:todayStr()});
  localStorage.setItem('pl_rdvs',JSON.stringify(rdvs));
  if(window.gfSync)gfSync('pl_rdvs',JSON.stringify(rdvs));
  showNotif('RDV créé dans le planning ✓');
}

function renouvelerContrat(id){
  const contrats=getContrats();
  const idx=contrats.findIndex(c=>c.id==id);if(idx<0)return;
  const c=contrats[idx];
  const fin=new Date(c.dateFin||todayStr());fin.setFullYear(fin.getFullYear()+1);
  const prochain=new Date(fin);
  if(c.periodicite==='mensuel')prochain.setMonth(prochain.getMonth()-11);
  contrats[idx]={...c,dateFin:fin.toISOString().split('T')[0],prochainEntretien:prochain.toISOString().split('T')[0],statut:'Actif'};
  saveContrats(contrats);renderAll();renderContrats();showNotif('Contrat renouvelé ✓');
}

function resilierContrat(id){
  if(!confirm('Résilier ce contrat ?'))return;
  const contrats=getContrats();
  const idx=contrats.findIndex(c=>c.id==id);
  if(idx>=0){contrats[idx].statut='Suspendu';saveContrats(contrats);}
  renderAll();renderContrats();showNotif('Contrat résilié');
}

function closeModal(id){document.getElementById(id).classList.add('hidden');}

function showNotif(msg){
  const n=document.createElement('div');n.className='notif';n.textContent=msg;
  document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}

window.onload=()=>{
  document.querySelectorAll('.pin-input').forEach((el,i,arr)=>{
    el.addEventListener('input',()=>{if(el.value&&i<arr.length-1)arr[i+1].focus();});
    el.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!el.value&&i>0)arr[i-1].focus();});
  });
  const s=localStorage.getItem('pl_session_contrats');
  if(s){currentUser=JSON.parse(s);if(USERS[currentUser.id]?.pin===currentUser.pin)lancerApp();}
};
</script>
</body>
</html>
