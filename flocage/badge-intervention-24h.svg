<?xml version="1.0" encoding="UTF-8"?>
<!-- Badge Intervention Rapide 24H/7J - GreenFlow Technologies -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" width="320" height="400">

  <!-- Bannière INTERVENTION RAPIDE -->
  <rect x="0" y="0" width="320" height="110" fill="#1a2e5a" rx="8"/>
  <!-- Ligne décorative bleue en bas de la bannière -->
  <rect x="0" y="102" width="320" height="8" fill="#4db8e8" rx="0"/>

  <text x="160" y="48" font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
        font-weight="900" font-size="32" fill="white" text-anchor="middle" letter-spacing="1">
    INTERVENTION
  </text>
  <text x="160" y="90" font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
        font-weight="900" font-size="38" fill="#4db8e8" text-anchor="middle" letter-spacing="3">
    RAPIDE
  </text>

  <!-- Badge circulaire 24H/7J -->
  <circle cx="160" cy="270" r="118" fill="#1a2e5a"/>
  <circle cx="160" cy="270" r="112" fill="none" stroke="#4db8e8" stroke-width="4"/>
  <circle cx="160" cy="270" r="105" fill="none" stroke="#5cb85c" stroke-width="1.5"/>

  <!-- Texte 24H -->
  <text x="160" y="258" font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
        font-weight="900" font-size="62" fill="white" text-anchor="middle">24H</text>

  <!-- Séparateur -->
  <line x1="80" y1="272" x2="240" y2="272" stroke="#4db8e8" stroke-width="3"/>

  <!-- Texte 7J/7 -->
  <text x="160" y="325" font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
        font-weight="900" font-size="50" fill="#4db8e8" text-anchor="middle">7J/7</text>
</svg>
