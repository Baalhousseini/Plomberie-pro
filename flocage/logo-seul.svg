<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" height="220">
  <defs>
    <!-- Dégradé bleu→vert pour la goutte -->
    <linearGradient id="goutte" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3bbce8" />
      <stop offset="55%"  stop-color="#1a9fd4" />
      <stop offset="100%" stop-color="#52b052" />
    </linearGradient>
    <!-- Dégradé vert pour la feuille -->
    <linearGradient id="feuille" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#72d472" />
      <stop offset="100%" stop-color="#3a9a3a" />
    </linearGradient>
  </defs>

  <!-- ======= ICÔNE GOUTTE + FEUILLE ======= -->
  <g transform="translate(18, 8)">
    <!-- Corps principal de la goutte (bleu-vert) -->
    <path d="M92,6
             C92,6 44,72 44,108
             C44,136 65,158 92,158
             C119,158 140,136 140,108
             C140,72 92,6 92,6 Z"
          fill="url(#goutte)" />

    <!-- Feuille verte (côté droit de la goutte) -->
    <path d="M92,40
             C92,40 128,68 132,104
             C132,104 118,128 92,122
             Z"
          fill="url(#feuille)" opacity="0.92"/>

    <!-- Reflet lumineux (coin haut-gauche) -->
    <ellipse cx="72" cy="72" rx="10" ry="18"
             fill="white" opacity="0.22"
             transform="rotate(-25 72 72)"/>

    <!-- Vague blanche 1 -->
    <path d="M58,108 Q75,94 92,106 Q109,118 126,104"
          stroke="white" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.88"/>
    <!-- Vague blanche 2 -->
    <path d="M60,126 Q77,113 93,124 Q110,135 127,122"
          stroke="white" stroke-width="2.8" fill="none"
          stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- ======= TEXTE "GreenFlow" ======= -->
  <!--
       "Green" en vert vif + "Flow" en bleu marine
       police ultra-grasse, alignée à gauche de l'icône
  -->
  <text y="118"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="96" dominant-baseline="auto">
    <tspan x="185" fill="#4ab84a">Green</tspan><tspan fill="#1a2e5a">Flow</tspan>
  </text>

  <!-- Ligne de séparation bleue -->
  <line x1="185" y1="132" x2="808" y2="132" stroke="#3bbce8" stroke-width="2.5"/>

  <!-- ======= SOUS-TITRE "Technologies" ======= -->
  <text x="190" y="175"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="300" font-size="36"
        fill="#1a2e5a" letter-spacing="12">
    Technologies
  </text>
</svg>
