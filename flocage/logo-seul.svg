<?xml version="1.0" encoding="UTF-8"?>
<!-- Logo GreenFlow Technologies - version standalone pour flocage -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="dropG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4db8e8" />
      <stop offset="50%" style="stop-color:#2a9fd6" />
      <stop offset="100%" style="stop-color:#5ab85c" />
    </linearGradient>
    <linearGradient id="leafG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6dcc6d" />
      <stop offset="100%" style="stop-color:#3a9e3a" />
    </linearGradient>
    <!-- Ombre légère -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Fond transparent -->

  <!-- ==== ICÔNE GOUTTE D'EAU ==== -->
  <g transform="translate(30, 25) scale(2.1)" filter="url(#shadow)">
    <!-- Corps de la goutte -->
    <path d="M55,5 C55,5 16,58 16,85 C16,108 33.5,126 55,126 C76.5,126 94,108 94,85 C94,58 55,5 55,5 Z"
          fill="url(#dropG)" />
    <!-- Feuille verte (moitié droite) -->
    <path d="M55,32 C55,32 78,52 82,78 C82,78 72,95 55,90 Z"
          fill="url(#leafG)" opacity="0.9"/>
    <!-- Reflet (highlight) -->
    <ellipse cx="38" cy="52" rx="8" ry="14" fill="white" opacity="0.25" transform="rotate(-20 38 52)"/>
    <!-- Vague intérieure 1 -->
    <path d="M28,85 Q40,73 55,83 Q70,93 82,81"
          stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Vague intérieure 2 -->
    <path d="M30,100 Q43,89 57,98 Q70,107 83,96"
          stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- ==== TEXTE GREENFLOW ==== -->
  <!-- Green -->
  <text x="240" y="128"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
        font-weight="900" font-size="80" fill="#5cb85c">Green</text>
  <!-- Flow -->
  <text x="240" y="128"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
        font-weight="900" font-size="80" fill="#1a2e5a">
    <tspan dx="268">Flow</tspan>
  </text>

  <!-- Ligne bleue décorative -->
  <line x1="240" y1="148" x2="488" y2="148" stroke="#4db8e8" stroke-width="3"/>

  <!-- TECHNOLOGIES -->
  <text x="240" y="192"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="300" font-size="32" fill="#1a2e5a" letter-spacing="11">
    TECHNOLOGIES
  </text>

  <!-- Ligne décorative verte (bas du logo) -->
  <line x1="240" y1="210" x2="488" y2="210" stroke="#5cb85c" stroke-width="1.5" opacity="0.5"/>
</svg>
