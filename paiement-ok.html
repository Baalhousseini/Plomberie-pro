<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement confirmé — GreenFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.12);}
.icon{font-size:64px;margin-bottom:16px;}
.title{font-size:24px;font-weight:800;color:#0d2d52;margin-bottom:8px;}
.sub{color:#6b7a8f;font-size:15px;margin-bottom:24px;}
.logo{font-size:13px;font-weight:700;color:#3a8c30;letter-spacing:1px;margin-top:24px;opacity:0.7;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">Paiement confirmé !</div>
  <div class="sub">Merci pour votre règlement. Vous allez recevoir un email de confirmation.</div>
  <div class="logo">GreenFlow Technologies</div>
</div>
</body>
</html>
